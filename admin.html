<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Test</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
width:300px;
text-align:center;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{background:#22c55e;color:white;}
.hidden{display:none;}
</style>
</head>

<body>

<div class="box">

<div id="login">
<h3>Login</h3>
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Enter</button>
</div>

<div id="panel" class="hidden">
<h3>SUCCESS ✅</h3>
<p>Admin panel is working</p>
</div>

</div>

<script>
function login(){
let p = document.getElementById("pass").value;

if(p === "12345"){
document.getElementById("login").style.display = "none";
document.getElementById("panel").style.display = "block";
}else{
alert("Wrong password");
}
}
</script>

</body>
</html>
