<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>

<body>

<h2>لوحة التحكم</h2>

<input id="usd" placeholder="USD إلى SYP">
<input id="try" placeholder="USD إلى TRY">
<textarea id="ads" placeholder="الإعلان"></textarea>

<button onclick="save()">حفظ</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function save(){
db.collection("settings").doc("rates").set({
SYP: Number(document.getElementById("usd").value),
TRY: Number(document.getElementById("try").value),
USD: 1,
ads: document.getElementById("ads").value
});

alert("تم الحفظ");
}
</script>

</body>
</html>
