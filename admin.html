<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.box{
width:90%;
max-width:400px;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
backdrop-filter:blur(15px);
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="box">

<div id="loginBox">
<h2>Admin Login</h2>
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="panel" class="hidden">

<h2>Control Panel</h2>

<input id="usd" placeholder="USD → SYP">
<input id="try" placeholder="USD → TRY">
<textarea id="ads" placeholder="Advertisement"></textarea>

<button onclick="save()">Save Changes</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_PASSWORD = "12345"; // غيرها لاحقاً

function login(){
let p = document.getElementById("pass").value;

if(p === ADMIN_PASSWORD){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("panel").classList.remove("hidden");
loadData();
}else{
alert("Wrong password");
}
}

async function loadData(){
let doc = await db.collection("settings").doc("rates").get();
let d = doc.data();

document.getElementById("usd").value = d.SYP;
document.getElementById("try").value = d.TRY;
document.getElementById("ads").value = d.ads;
}

function save(){
db.collection("settings").doc("rates").set({
USD:1,
SYP:Number(document.getElementById("usd").value),
TRY:Number(document.getElementById("try").value),
ads:document.getElementById("ads").value
});

alert("Saved!");
}
</script>

</body>
</html>
