<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.box{
width:90%;
max-width:400px;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
backdrop-filter:blur(15px);
}

input,textarea,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div id="loginBox">
<h2>Admin Login</h2>
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">
<h2>Control Panel</h2>

<input id="usd" placeholder="USD → SYP">
<input id="try" placeholder="USD → TRY">
<textarea id="ads" placeholder="Advertisement"></textarea>

<button onclick="save()">Save</button>
</div>

</div>

<script>
const ADMIN_PASSWORD = "12345";

function login(){
let pass = document.getElementById("pass").value;

if(pass === ADMIN_PASSWORD){
document.getElementById("loginBox").style.display = "none";
document.getElementById("panel").style.display = "block";
}else{
alert("Wrong password");
}
}

function save(){
alert("Saved (Firebase not connected check config)");
}
</script>

</body>

</body>
</html>
