<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>

<body>

<h2>لوحة التحكم</h2>

<input id="usd" placeholder="USD إلى SYP">
<input id="try" placeholder="USD إلى TRY">
<textarea id="ads" placeholder="الإعلان"></textarea>

<button onclick="save()">حفظ</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyCVJclfpEp9Jo9879C3RfZKiEdBUibwrxI",
authDomain: "ahmad-662ee.firebaseapp.com",
projectId: "ahmad-662ee",
storageBucket: "ahmad-662ee.firebasestorage.app",
messagingSenderId: "740891153734",
appId: "1:740891153734:web:51e912a46aa35f6a618147"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function save(){
db.collection("settings").doc("rates").set({
SYP: Number(document.getElementById("usd").value),
TRY: Number(document.getElementById("try").value),
USD: 1,
ads: document.getElementById("ads").value
});

alert("تم الحفظ");
}
</script>

</body>
</html>
