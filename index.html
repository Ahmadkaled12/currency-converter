<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMEI Currency App</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#7c3aed,#2563eb);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

/* CONTAINER */
.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.10);
backdrop-filter:blur(18px);
padding:22px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo{
text-align:center;
font-size:26px;
font-weight:bold;
margin-bottom:10px;
color:#38bdf8;
letter-spacing:1px;
}

h2{
text-align:center;
margin-bottom:10px;
color:#facc15;
}

/* INPUTS */
input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

input,select{
background:#f8fafc;
color:#111;
}

/* BUTTONS */
button{
cursor:pointer;
font-weight:bold;
transition:0.25s;
}

button:hover{
transform:scale(1.04);
}

.swap{
background:#f97316;
color:white;
}

.convert{
background:#22c55e;
color:white;
}

/* RESULT */
#result{
margin-top:15px;
padding:14px;
background:rgba(0,0,0,0.25);
border-radius:10px;
text-align:center;
font-size:20px;
font-weight:bold;
transition:0.3s;
}

/* 🔥 PREMIUM ADS SECTION */
.ads-container{
margin-top:15px;
padding:14px;
border-radius:16px;
background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(37,99,235,0.25));
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
box-shadow:0 10px 25px rgba(0,0,0,0.35);
position:relative;
overflow:hidden;
}

.ads-container::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 60%);
animation:glow 6s linear infinite;
}

@keyframes glow{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.ads-header{
text-align:center;
font-size:11px;
font-weight:bold;
color:#facc15;
letter-spacing:2px;
margin-bottom:8px;
}

.ads-frame{
overflow:hidden;
white-space:nowrap;
position:relative;
height:24px;
display:flex;
align-items:center;
}

.ads-text{
display:inline-block;
padding-left:100%;
font-size:15px;
font-weight:600;
color:#ffffff;
animation:scroll 10s linear infinite;
text-shadow:0 0 10px rgba(255,255,255,0.4);
}

@keyframes scroll{
0% { transform: translateX(0); }
100% { transform: translateX(-100%); }
}

</style>
</head>

<body>

<div class="container">

<div class="logo">مساعدة لتحويل العملة 💱</div>

<h2>Currency Converter</h2>

<input id="amount" type="number" placeholder="Enter amount">

<select id="from">
<option value="USD">USD</option>
<option value="SYP">SYP</option>
<option value="TRY">TRY</option>
</select>

<select id="to">
<option value="SYP">SYP</option>
<option value="USD">USD</option>
<option value="TRY">TRY</option>
</select>

<button class="swap" onclick="swap()">Swap</button>
<button class="convert" onclick="convert()">Convert</button>

<div id="result">0.00</div>

<!-- ADS -->
<div class="ads-container">
  <div class="ads-header">📢 LIVE ANNOUNCEMENTS</div>
  <div class="ads-frame">
    <div class="ads-text" id="adsBox">Loading announcements...</div>
  </div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCVJClfpEp9Jo9879C3RfZKiEdBUibwrxI",
authDomain: "ahmad-662ee.firebaseapp.com",
projectId: "ahmad-662ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let rates = {};

// 🔥 LOAD DATA
async function load(){
const snap = await getDoc(doc(db,"settings","rates"));

if(snap.exists()){
rates = snap.data();
document.getElementById("adsBox").innerText =
rates.ads || "No ads";
}
}

// 🔄 CONVERT
window.convert = function(){
let amount = Number(document.getElementById("amount").value);
let from = document.getElementById("from").value;
let to = document.getElementById("to").value;

if(!amount){
alert("Enter amount");
return;
}

let usd = amount / rates[from];
let result = usd * rates[to];

document.getElementById("result").innerText =
result.toFixed(2) + " " + to;
}

// 🔁 SWAP
window.swap = function(){
let f = document.getElementById("from");
let t = document.getElementById("to");
[f.value,t.value]=[t.value,f.value];
}

// START
load();
setInterval(load,5000);
</script>

</body>
</html>
