<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlineNet Currency Converter</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
radial-gradient(circle at top left,#2563eb,#0f172a 35%),
radial-gradient(circle at bottom right,#1d4ed8,#020617 45%);
}

.container{
width:100%;
max-width:430px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
padding:30px;
border-radius:28px;
box-shadow:0 15px 40px rgba(0,0,0,.4);
color:white;
}

h1{
text-align:center;
font-size:28px;
margin-bottom:10px;
}

.live{
text-align:center;
color:#93c5fd;
margin-bottom:20px;
font-size:14px;
}

input,select{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:17px;
background:white;
outline:none;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.convert{
background:#22c55e;
color:white;
}

.swap{
background:#2563eb;
color:white;
}

button:hover{
transform:translateY(-2px);
}

#result{
margin-top:20px;
padding:18px;
border-radius:16px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
font-size:28px;
font-weight:bold;
text-align:center;
}

.rates{
margin-top:15px;
background:rgba(255,255,255,.08);
padding:12px;
border-radius:12px;
font-size:14px;
line-height:1.8;
}

.footer{
margin-top:12px;
text-align:center;
font-size:12px;
color:#cbd5e1;
}
</style>
</head>

<body>

<div class="container">

<h1>💱 OnlineNet</h1>

<div class="live">
⚡ أسعار محدثة تلقائياً
</div>

<input type="number" id="amount" placeholder="أدخل المبلغ">

<select id="from">
<option value="USD">🇺🇸 دولار أمريكي</option>
<option value="TRY">🇹🇷 ليرة تركية</option>
<option value="SYP">🇸🇾 ليرة سورية</option>
</select>

<button class="swap" onclick="swapCurrencies()">
🔄 تبديل العملات
</button>

<select id="to">
<option value="SYP">🇸🇾 ليرة سورية</option>
<option value="USD">🇺🇸 دولار أمريكي</option>
<option value="TRY">🇹🇷 ليرة تركية</option>
</select>

<button class="convert" onclick="convert()">
تحويل الآن
</button>

<div id="result">
0.00
</div>

<div class="rates" id="ratesBox">
جاري تحميل أسعار الصرف...
</div>

<div class="footer">
OnlineNet Currency Converter
</div>

</div>

<script>

let rates = {
USD:1,
TRY:40,
SYP:14500
};

async function loadRates(){

try{

const response = await fetch(
"https://open.er-api.com/v6/latest/USD"
);

const data = await response.json();

rates.USD = 1;
rates.TRY = data.rates.TRY;

document.getElementById("ratesBox").innerHTML =
"🇺🇸 1 USD = " +
rates.TRY.toFixed(2) +
" TRY<br>" +
"🇺🇸 1 USD = " +
rates.SYP.toLocaleString() +
" SYP";

}catch(error){

document.getElementById("ratesBox").innerHTML =
"تعذر تحديث الأسعار";

}

}

loadRates();

function convert(){

const amount =
parseFloat(
document.getElementById("amount").value
);

if(isNaN(amount)){
alert("أدخل مبلغاً صحيحاً");
return;
}

const from =
document.getElementById("from").value;

const to =
document.getElementById("to").value;

const usd =
amount / rates[from];

const result =
usd * rates[to];

document.getElementById("result").innerHTML =
result.toLocaleString(
"en-US",
{
maximumFractionDigits:2
}
) + " " + to;

}

function swapCurrencies(){

let from =
document.getElementById("from");

let to =
document.getElementById("to");

let temp = from.value;

from.value = to.value;
to.value = temp;

}

</script>

</body>
</html>
