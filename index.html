<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:20px;
border-radius:15px;
}

h2{text-align:center;}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.swap{
background:#2563eb;
}

#result{
margin-top:15px;
padding:15px;
background:rgba(0,0,0,0.3);
border-radius:10px;
text-align:center;
font-size:20px;
}

.ads{
margin-top:10px;
padding:10px;
background:rgba(0,0,0,0.2);
border-radius:10px;
font-size:14px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>💱 Currency Converter</h2>

<input id="amount" type="number" placeholder="Enter amount">

<select id="from">
<option value="USD">USD</option>
<option value="SYP">SYP</option>
<option value="TRY">TRY</option>
</select>

<select id="to">
<option value="SYP">SYP</option>
<option value="USD">USD</option>
<option value="TRY">TRY</option>
</select>

<button class="تحويل" onclick="swap()">تحويل</button>
<button onclick="convert()">Convert</button>

<div id="result">0.00</div>

<div class="ads" id="adsBox">Loading ads...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCVJclfpEp9Jo9879C3RfZKiEdBUibwrxI",
authDomain: "ahmad-662ee.firebaseapp.com",
projectId: "ahmad-662ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let rates = {};

// 🔥 LOAD DATA FROM FIREBASE
async function load(){
const snap = await getDoc(doc(db,"settings","rates"));

if(snap.exists()){
rates = snap.data();

document.getElementById("adsBox").innerText =
rates.ads || "No ads";
}
}

// 🔄 CONVERT
window.convert = function(){
let amount = Number(document.getElementById("amount").value);
let from = document.getElementById("from").value;
let to = document.getElementById("to").value;

if(!amount){
alert("Enter amount");
return;
}

let usd = amount / rates[from];
let result = usd * rates[to];

document.getElementById("result").innerText =
result.toFixed(2) + " " + to;
}

// 🔁 تحويل
window.swap = function(){
let f = document.getElementById("from");
let t = document.getElementById("to");
[f.value,t.value]=[t.value,f.value];
}

// START
load();
setInterval(load,5000);
</script>

</body>
</html>
