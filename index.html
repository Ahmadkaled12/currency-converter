<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMEI Exchange</title>

<style>
body{
margin:0;
font-family:"Segoe UI",Tahoma,sans-serif;
background:linear-gradient(135deg,#0a0f1f,#1e1b4b,#0f172a);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

/* CARD */
.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(22px);
padding:24px;
border-radius:28px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 20px 50px rgba(0,0,0,0.45);
}

/* LOGO */
.logo{
text-align:center;
font-size:28px;
font-weight:900;
color:#38bdf8;
margin-bottom:8px;
}

/* LIVE RATE BOX */
.rate-box{
background:rgba(0,0,0,0.25);
padding:10px;
border-radius:14px;
text-align:center;
margin-bottom:12px;
font-weight:bold;
color:#facc15;
box-shadow:0 0 10px rgba(255,255,255,0.1);
}

/* INPUTS */
input,select{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:18px;
font-size:16px;
outline:none;
background:#f8fafc;
}

/* BUTTONS */
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:22px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{transform:scale(1.03);}

.swap{
background:linear-gradient(135deg,#ff6a00,#ff3c5f);
color:white;
}

.convert{
background:linear-gradient(135deg,#00c853,#009624);
color:white;
}

/* RESULT */
#result{
margin-top:14px;
padding:16px;
border-radius:18px;
background:rgba(0,0,0,0.25);
text-align:center;
font-size:20px;
font-weight:bold;
}

/* ADS */
.ads-container{
margin-top:16px;
padding:14px;
border-radius:18px;
background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(37,99,235,0.25));
border:1px solid rgba(255,255,255,0.18);
text-align:center;
overflow:hidden;
}

.ads-text{
white-space:nowrap;
display:inline-block;
padding-left:100%;
animation:move 10s linear infinite;
font-weight:bold;
}

@keyframes move{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">💱 UMEI Exchange</div>

<!-- 🔥 سعر الصرف بالأعلى -->
<div class="rate-box" id="rateBox">Loading rates...</div>

<input id="amount" type="number" placeholder="أدخل المبلغ">

<select id="from">
<option value="USD">دولار</option>
<option value="SYP">ليرة سورية</option>
<option value="TRY">ليرة تركية</option>
</select>

<select id="to">
<option value="SYP">ليرة سورية</option>
<option value="USD">دولار</option>
<option value="TRY">ليرة تركية</option>
</select>

<button class="swap" onclick="swap()">تبديل</button>
<button class="convert" onclick="convert()">تحويل</button>

<div id="result">0.00</div>

<!-- ADS بالأسفل -->
<div class="ads-container">
<div class="ads-text" id="adsBox">Loading ads...</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCVJClfpEp9Jo9879C3RfZKiEdBUibwrx",
authDomain: "ahmad-662ee.firebaseapp.com",
projectId: "ahmad-662ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let rates = { USD:1 };

// 🔥 جلب الإعلانات
async function loadAds(){
const snap = await getDoc(doc(db,"settings","rates"));
if(snap.exists()){
document.getElementById("adsBox").innerText =
snap.data().ads || "لا يوجد إعلان";
}
}

// 🔥 أسعار حقيقية (API عالمي)
async function loadRates(){
try{
const res = await fetch("https://open.er-api.com/v6/latest/USD");
const data = await res.json();

rates = {
USD:1,
SYP:data.rates.SYP,
TRY:data.rates.TRY
};

// عرض السعر بالأعلى
document.getElementById("rateBox").innerText =
`USD → SYP: ${rates.SYP} | USD → TRY: ${rates.TRY}`;

}catch(e){
document.getElementById("rateBox").innerText =
"فشل تحميل أسعار الصرف";
}
}

window.convert = function(){
let amount = Number(document.getElementById("amount").value);
let from = document.getElementById("from").value;
let to = document.getElementById("to").value;

if(!amount){
alert("أدخل المبلغ");
return;
}

let usd = amount / rates[from];
let result = usd * rates[to];

document.getElementById("result").innerText =
result.toFixed(2) + " " + to;
}

window.swap = function(){
let f = document.getElementById("from");
let t = document.getElementById("to");
[f.value,t.value]=[t.value,f.value];
}

async function init(){
await loadRates();
await loadAds();
}

init();
setInterval(loadRates,60000);
setInterval(loadAds,5000);
</script>

</body>
</html>
