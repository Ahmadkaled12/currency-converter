<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMEI Currency App</title>

<style>
body{
margin:0;
font-family: "Segoe UI", Tahoma, sans-serif;
background: linear-gradient(135deg,#0a0f1f,#1e1b4b,#0f172a);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

/* CARD */
.container{
width:90%;
max-width:420px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(22px);
padding:26px;
border-radius:32px;
border:1px solid rgba(255,255,255,0.15);
box-shadow: 0 20px 50px rgba(0,0,0,0.45);
animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo{
text-align:center;
font-size:30px;
font-weight:900;
margin-bottom:10px;
color:#38bdf8;
text-shadow:0 0 18px rgba(56,189,248,0.5);
}

/* TITLE */
h2{
text-align:center;
margin-bottom:18px;
color:#facc15;
letter-spacing:1px;
}

/* INPUTS */
input,select{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:20px;
font-size:16px;
outline:none;
background:#f8fafc;
transition:0.3s;
}

input:focus,select:focus{
box-shadow:0 0 14px rgba(56,189,248,0.6);
transform:scale(1.03);
}

/* BUTTONS */
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:26px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
position:relative;
overflow:hidden;
}

/* shine effect */
button::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:120%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.35),transparent);
transition:0.6s;
}

button:hover::before{
left:120%;
}

button:hover{
transform:translateY(-3px);
}

/* COLORS */
.swap{
background: linear-gradient(135deg,#ff6a00,#ff3c5f);
box-shadow:0 0 18px rgba(255,90,50,0.4);
color:white;
}

.convert{
background: linear-gradient(135deg,#00c853,#009624);
box-shadow:0 0 18px rgba(0,200,83,0.4);
color:white;
}

/* RESULT */
#result{
margin-top:16px;
padding:18px;
border-radius:22px;
background: rgba(0,0,0,0.25);
text-align:center;
font-size:22px;
font-weight:bold;
letter-spacing:1px;
}

/* ADS PREMIUM */
.ads-container{
margin-top:20px;
padding:15px;
border-radius:22px;
background: linear-gradient(135deg,rgba(124,58,237,0.25),rgba(37,99,235,0.25));
border:1px solid rgba(255,255,255,0.18);
backdrop-filter: blur(18px);
position:relative;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

/* soft glow */
.ads-container::after{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background: radial-gradient(circle,rgba(255,255,255,0.08),transparent 60%);
animation: glow 7s linear infinite;
}

@keyframes glow{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* HEADER */
.ads-header{
text-align:center;
font-size:12px;
font-weight:bold;
color:#facc15;
letter-spacing:2px;
margin-bottom:10px;
text-shadow:0 0 10px rgba(250,204,21,0.4);
}

/* MOVING TEXT */
.ads-frame{
overflow:hidden;
white-space:nowrap;
height:28px;
display:flex;
align-items:center;
}

.ads-text{
display:inline-block;
padding-left:100%;
font-size:15px;
font-weight:600;
color:#ffffff;
animation:scrollText 11s linear infinite;
text-shadow:0 0 10px rgba(255,255,255,0.25);
}

@keyframes scrollText{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">💱 UMEI Exchange</div>

<h2>محول العملات</h2>

<input id="amount" type="number" placeholder="أدخل المبلغ">

<select id="from">
<option value="USD">دولار أمريكي</option>
<option value="SYP">ليرة سورية</option>
<option value="TRY">ليرة تركية</option>
</select>

<select id="to">
<option value="SYP">ليرة سورية</option>
<option value="USD">دولار أمريكي</option>
<option value="TRY">ليرة تركية</option>
</select>

<button class="swap" onclick="swap()">تبديل العملات</button>
<button class="convert" onclick="convert()">تحويل</button>

<div id="result">0.00</div>

<!-- ADS -->
<div class="ads-container">
  <div class="ads-header">📢 الإعلانات</div>
  <div class="ads-frame">
    <div class="ads-text" id="adsBox">جاري تحميل الإعلانات...</div>
  </div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCVJClfpEp9Jo9879C3RfZKiEdBUibwrxI",
authDomain: "ahmad-662ee.firebaseapp.com",
projectId: "ahmad-662ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let rates = {};

async function load(){
const snap = await getDoc(doc(db,"settings","rates"));

if(snap.exists()){
rates = snap.data();
document.getElementById("adsBox").innerText =
rates.ads || "لا يوجد إعلان حالياً";
}
}

window.convert = function(){
let amount = Number(document.getElementById("amount").value);
let from = document.getElementById("from").value;
let to = document.getElementById("to").value;

if(!amount){
alert("أدخل المبلغ");
return;
}

let usd = amount / rates[from];
let result = usd * rates[to];

document.getElementById("result").innerText =
result.toFixed(2) + " " + to;
}

window.swap = function(){
let f = document.getElementById("from");
let t = document.getElementById("to");
[f.value,t.value]=[t.value,f.value];
}

load();
setInterval(load,5000);
</script>

</body>
</html>
