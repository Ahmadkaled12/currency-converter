<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlineNet Currency Converter</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
padding:20px;
}

.container{
width:100%;
max-width:400px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.3);
color:white;
}

h2{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

.swap{
background:#3b82f6;
}

#result{
margin-top:20px;
padding:15px;
background:rgba(0,0,0,.25);
border-radius:10px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.note{
margin-top:10px;
text-align:center;
font-size:12px;
color:#cbd5e1;
}
</style>
</head>
<body>

<div class="container">

<h2>💱 OnlineNet Currency Converter</h2>

<input type="number" id="amount" placeholder="أدخل المبلغ">

<select id="from">
<option value="SYP">🇸🇾 ليرة سورية</option>
<option value="USD">🇺🇸 دولار أمريكي</option>
<option value="TRY">🇹🇷 ليرة تركية</option>
</select>

<button class="swap" onclick="swapCurrencies()">🔄 تبديل العملات</button>

<select id="to">
<option value="USD">🇺🇸 دولار أمريكي</option>
<option value="TRY">🇹🇷 ليرة تركية</option>
<option value="SYP">🇸🇾 ليرة سورية</option>
</select>

<button onclick="convert()">تحويل</button>

<div id="result">النتيجة ستظهر هنا</div>

<div class="note">
يمكن تعديل أسعار الصرف من داخل الكود
</div>

</div>

<script>

const rates = {
USD: 1,
SYP: 14500,
TRY: 40
};

function convert(){

let amount = parseFloat(document.getElementById("amount").value);
let from = document.getElementById("from").value;
let to = document.getElementById("to").value;

if(isNaN(amount)){
alert("أدخل مبلغاً صحيحاً");
return;
}

let usd = amount / rates[from];
let result = usd * rates[to];

document.getElementById("result").innerHTML =
result.toLocaleString("en-US",{maximumFractionDigits:2}) + " " + to;

}

function swapCurrencies(){

let from = document.getElementById("from");
let to = document.getElementById("to");

let temp = from.value;
from.value = to.value;
to.value = temp;

}

</script>

</body>
</html>
