<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMEI Currency App</title>

<style>
body{
margin:0;
font-family: 'Segoe UI', Tahoma, sans-serif;
background: linear-gradient(135deg,#0b1220,#1e1b4b,#0f172a);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

/* CARD */
.container{
width:90%;
max-width:420px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
padding:24px;
border-radius:28px;
border:1px solid rgba(255,255,255,0.15);
box-shadow: 0 15px 40px rgba(0,0,0,0.4);
animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(15px);}
to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo{
text-align:center;
font-size:28px;
font-weight:800;
margin-bottom:10px;
color:#38bdf8;
text-shadow:0 0 15px rgba(56,189,248,0.4);
}

/* TITLE */
h2{
text-align:center;
margin-bottom:15px;
color:#facc15;
}

/* INPUTS */
input,select{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:18px;
font-size:16px;
outline:none;
background:#f8fafc;
transition:0.3s;
}

input:focus,select:focus{
box-shadow:0 0 10px rgba(56,189,248,0.5);
transform:scale(1.02);
}

/* BUTTONS */
button{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:22px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
position:relative;
overflow:hidden;
}

/* hover shine */
button::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.3),transparent);
transition:0.5s;
}

button:hover::before{
left:100%;
}

button:hover{
transform:translateY(-2px);
}

/* COLORS */
.swap{
background:linear-gradient(135deg,#f97316,#fb7185);
box-shadow:0 0 15px rgba(249,115,22,0.4);
color:white;
}

.convert{
background:linear-gradient(135deg,#22c55e,#16a34a);
box-shadow:0 0 15px rgba(34,197,94,0.4);
color:white;
}

/* RESULT */
#result{
margin-top:16px;
padding:16px;
border-radius:18px;
background:rgba(0,0,0,0.25);
text-align:center;
font-size:20px;
font-weight:bold;
}

/* ADS PREMIUM */
.ads-container{
margin-top:18px;
padding:14px;
border-radius:20px;
background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(37,99,235,0.25));
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
position:relative;
overflow:hidden;
}

.ads-container::after{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 60%);
animation: glow 6s linear infinite;
}

@keyframes glow{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.ads-header{
text-align:center;
font-size:12px;
font-weight:bold;
color:#facc15;
letter-spacing:2px;
margin-bottom:10px;
}

.ads-frame{
overflow:hidden;
white-space:nowrap;
height:26px;
display:flex;
align-items:center;
}

.ads-text{
display:inline-block;
padding-left:100%;
font-size:15px;
font-weight:600;
color:#ffffff;
animation:scrollText 10s linear infinite;
text-shadow:0 0 10px rgba(255,255,255,0.3);
}

@keyframes scrollText{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">مساعدة لتحويل العملة 💱</div>

<h2>محول العملات</h2>

<input id="amount" type="number" placeholder="أدخل المبلغ">

<select id="from">
<option value="USD">دولار أمريكي</option>
<option value="SYP">ليرة سورية</option>
<option value="TRY">ليرة تركية</option>
</select>

<select id="to">
<option value="SYP">ليرة سورية</option>
<option value="USD">دولار أمريكي</option>
<option value="TRY">ليرة تركية</option>
</select>

<button class="swap" onclick="swap()">تبديل</button>
<button class="convert" onclick="convert()">تحويل</button>

<div id="result">0.00</div>

<!-- ADS -->
<div class="ads-container">
  <div class="ads-header">📢 LIVE ANNOUNCEMENTS</div>
  <div class="ads-frame">
    <div class="ads-text" id="adsBox">Loading announcements...</div>
  </div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCVJClfpEp9Jo9879C3RfZKiEdBUibwrxI",
authDomain: "ahmad-662ee.firebaseapp.com",
projectId: "ahmad-662ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let rates = {};

async function load(){
const snap = await getDoc(doc(db,"settings","rates"));

if(snap.exists()){
rates = snap.data();
document.getElementById("adsBox").innerText =
rates.ads || "لا يوجد إعلان";
}
}

window.convert = function(){
let amount = Number(document.getElementById("amount").value);
let from = document.getElementById("from").value;
let to = document.getElementById("to").value;

if(!amount){
alert("أدخل المبلغ");
return;
}

let usd = amount / rates[from];
let result = usd * rates[to];

document.getElementById("result").innerText =
result.toFixed(2) + " " + to;
}

window.swap = function(){
let f = document.getElementById("from");
let t = document.getElementById("to");
[f.value,t.value]=[t.value,f.value];
}

load();
setInterval(load,5000);
</script>

</body>
</html>
