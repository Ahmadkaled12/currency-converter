<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMEI Currency App</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#7c3aed,#2563eb);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.10);
backdrop-filter:blur(18px);
padding:22px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
text-align:center;
font-size:26px;
font-weight:bold;
margin-bottom:10px;
color:#38bdf8;
}

h2{
text-align:center;
margin-bottom:10px;
color:#facc15;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

input,select{
background:#f8fafc;
color:#111;
}

button{
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

.swap{
background:#f97316;
color:white;
}

.convert{
background:#22c55e;
color:white;
}

#result{
margin-top:15px;
padding:14px;
background:rgba(0,0,0,0.25);
border-radius:10px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.ads{
margin-top:10px;
padding:10px;
background:rgba(0,0,0,0.2);
border-radius:10px;
font-size:13px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">مساعدة لتحويل العملة 💱</div>

<h2>Currency Converter</h2>

<input id="amount" type="number" placeholder="Enter amount">

<select id="from">
<option value="USD">USD</option>
<option value="SYP">SYP</option>
<option value="TRY">TRY</option>
</select>

<select id="to">
<option value="SYP">SYP</option>
<option value="USD">USD</option>
<option value="TRY">TRY</option>
</select>

<button class="swap" onclick="swap()">Swap</button>
<button class="convert" onclick="convert()">Convert</button>

<div id="result">0.00</div>

<div class="ads-container">

  <div class="ads-header">
    📢 LIVE ANNOUNCEMENTS
  </div>

  <div class="ads-frame">
    <div class="ads-text" id="adsBox">
      Loading announcements...
    </div>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCVJclfpEp9Jo9879C3RfZKiEdBUibwrxI",
authDomain: "ahmad-662ee.firebaseapp.com",
projectId: "ahmad-662ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let rates = {};

// 🔥 LOAD DATA FROM FIREBASE
async function load(){
const snap = await getDoc(doc(db,"settings","rates"));

if(snap.exists()){
rates = snap.data();
document.getElementById("adsBox").innerText =
rates.ads || "No ads";
}
}

// 🔄 التحويل
window.convert = function(){
let amount = Number(document.getElementById("amount").value);
let from = document.getElementById("from").value;
let to = document.getElementById("to").value;

if(!amount){
alert("Enter amount");
return;
}

let usd = amount / rates[from];
let result = usd * rates[to];

document.getElementById("result").innerText =
result.toFixed(2) + " " + to;
}

// 🔁 تبادل
window.swap = function(){
let f = document.getElementById("from");
let t = document.getElementById("to");
[f.value,t.value]=[t.value,f.value];
}

// START
load();
setInterval(load,5000);
</script>

</body>
</html>
