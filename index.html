<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محول العملات</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:25px;
border-radius:20px;
color:white;
}

h2{text-align:center;}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
cursor:pointer;
font-weight:bold;
}

.convert{background:#22c55e;color:white;}
.swap{background:#2563eb;color:white;}

#result{
margin-top:15px;
padding:15px;
background:#1d4ed8;
border-radius:12px;
font-size:22px;
text-align:center;
}

.ads{
margin-top:15px;
background:rgba(0,0,0,0.3);
padding:10px;
border-radius:10px;
font-size:14px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>💱 محول العملات</h2>

<input id="amount" type="number" placeholder="أدخل المبلغ">

<select id="from">
<option value="USD">دولار</option>
<option value="TRY">ليرة تركية</option>
<option value="SYP">ليرة سورية</option>
</select>

<select id="to">
<option value="SYP">ليرة سورية</option>
<option value="USD">دولار</option>
<option value="TRY">ليرة تركية</option>
</select>

<button class="swap" onclick="swap()">🔄 تبديل</button>
<button class="convert" onclick="convert()">تحويل</button>

<div id="result">0</div>

<div class="ads" id="adsBox">جاري تحميل الإعلانات...</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let rates = {};

async function load(){
const doc = await db.collection("settings").doc("rates").get();
rates = doc.data();
document.getElementById("adsBox").innerText = rates.ads || "لا يوجد إعلانات";
}
load();

function convert(){
let amount = +document.getElementById("amount").value;
let from = document.getElementById("from").value;
let to = document.getElementById("to").value;

let usd = amount / rates[from];
let result = usd * rates[to];

document.getElementById("result").innerText =
result.toFixed(2) + " " + to;
}

function swap(){
let f = document.getElementById("from");
let t = document.getElementById("to");
[f.value, t.value] = [t.value, f.value];
}
</script>

</body>
</html>
